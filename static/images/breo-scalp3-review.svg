<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#grad1)"/>

  <!-- Decorative elements -->
  <circle cx="150" cy="100" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="650" cy="300" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="400" cy="400" r="100" fill="rgba(255,255,255,0.05)"/>

  <!-- Main title -->
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="bold">Breo Scalp3 Trilogy</text>

  <!-- Subtitle -->
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">The Ultimate Scalp Health Solution</text>

  <!-- Description -->
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Red Light Therapy for Hair Growth</text>

  <!-- Scalp massager icon -->
  <g transform="translate(400, 320)">
    <circle cx="0" cy="0" r="40" fill="rgba(255,255,255,0.2)"/>
    <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.3)"/>
    <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,0.4)"/>
    <!-- Massage nodes -->
    <circle cx="-20" cy="-10" r="5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="20" cy="-10" r="5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="-15" cy="15" r="5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="15" cy="15" r="5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="0" cy="-20" r="5" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- Feature badges -->
  <rect x="280" y="350" width="90" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="325" y="367" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Red Light</text>

  <rect x="390" y="350" width="90" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="435" y="367" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Hair Growth</text>

  <rect x="500" y="350" width="90" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="545" y="367" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Waterproof</text>
