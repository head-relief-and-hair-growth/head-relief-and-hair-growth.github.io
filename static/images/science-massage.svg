<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="rgba(102,126,234,0.1)"/>
  <circle cx="700" cy="300" r="80" fill="rgba(17,153,142,0.1)"/>
  <circle cx="650" cy="80" r="40" fill="rgba(118,75,162,0.08)"/>
  
  <!-- Head silhouette -->
  <ellipse cx="280" cy="200" rx="80" ry="100" fill="url(#headGrad)" opacity="0.9"/>
  
  <!-- Brain waves/neural connections -->
  <g stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none">
    <path d="M240 160 Q260 140 280 160 T320 160"/>
    <path d="M250 180 Q270 160 290 180 T310 180"/>
    <path d="M260 200 Q280 180 300 200"/>
  </g>
  
  <!-- Hair follicles -->
  <g fill="url(#hairGrad)">
    <ellipse cx="220" cy="140" rx="8" ry="15"/>
    <ellipse cx="240" cy="125" rx="8" ry="15"/>
    <ellipse cx="265" cy="115" rx="8" ry="15"/>
    <ellipse cx="295" cy="115" rx="8" ry="15"/>
    <ellipse cx="320" cy="125" rx="8" ry="15"/>
    <ellipse cx="340" cy="140" rx="8" ry="15"/>
  </g>
  
  <!-- Massage hands -->
  <g transform="translate(380, 150)">
    <ellipse cx="0" cy="0" rx="25" ry="35" fill="#f39c12" opacity="0.8"/>
    <ellipse cx="15" cy="5" rx="20" ry="30" fill="#f39c12" opacity="0.8"/>
    <ellipse cx="-15" cy="5" rx="20" ry="30" fill="#f39c12" opacity="0.8"/>
  </g>
  
  <!-- Blood circulation arrows -->
  <g stroke="#e74c3c" stroke-width="3" fill="none" marker-end="url(#arrowhead)">
    <path d="M420 180 Q450 160 480 180"/>
    <path d="M420 220 Q450 240 480 220"/>
  </g>
  
  <!-- Red light therapy indicator -->
  <circle cx="520" cy="200" r="40" fill="none" stroke="#f39c12" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="520" cy="200" r="25" fill="rgba(243,156,18,0.3)"/>
  
  <!-- Title -->
  <text x="580" y="160" font-family="Arial, sans-serif" font-size="28" fill="#2c3e50" text-anchor="middle" font-weight="bold">The Science</text>
  <text x="580" y="195" font-family="Arial, sans-serif" font-size="28" fill="#2c3e50" text-anchor="middle" font-weight="bold">Behind Massage</text>
  
  <!-- Subtitle -->
  <text x="580" y="240" font-family="Arial, sans-serif" font-size="16" fill="#27ae60" text-anchor="middle" font-weight="600">Headache Relief &amp; Hair Growth</text>
  
  <!-- Scientific badges -->
  <rect x="500" y="280" width="80" height="28" rx="14" fill="#3498db"/>
  <text x="540" y="298" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Research</text>
  
  <rect x="590" y="280" width="80" height="28" rx="14" fill="#9b59b6"/>
  <text x="630" y="298" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Evidence</text>
</svg>