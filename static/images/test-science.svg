<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#grad1)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(233,69,96,0.1)"/>
  <circle cx="700" cy="300" r="120" fill="rgba(233,69,96,0.08)"/>
  <circle cx="650" cy="80" r="50" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Main title -->
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="bold">Breo iDream5S &amp; Scalp3</text>
  
  <!-- Subtitle -->
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="24" fill="url(#grad2)" text-anchor="middle" font-weight="600">Complete Review 2026</text>
  
  <!-- Description -->
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">The Ultimate Head Massage Experience</text>
  
  <!-- Icons/Decorations -->
  <g transform="translate(200, 300)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(233,69,96,0.5)" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="rgba(233,69,96,0.3)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">★</text>
  </g>
  
  <g transform="translate(600, 300)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(233,69,96,0.5)" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="rgba(233,69,96,0.3)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">♥</text>
  </g>
  
  <!-- Product category badges -->
  <rect x="280" y="310" width="100" height="30" rx="15" fill="rgba(233,69,96,0.8)"/>
  <text x="330" y="330" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="500">Smart Tech</text>
  
  <rect x="420" y="310" width="100" height="30" rx="15" fill="rgba(233,69,96,0.8)"/>
  <text x="470" y="330" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="500">Wellness</text>
</svg>