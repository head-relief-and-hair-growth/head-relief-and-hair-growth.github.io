<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f618d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#grad1)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="300" r="70" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="100" r="90" fill="rgba(255,255,255,0.08)"/>
  <circle cx="400" cy="0" r="120" fill="rgba(255,255,255,0.05)"/>

  <!-- Main title -->
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="bold">Buying Guide</text>

  <!-- Subtitle -->
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">Head &amp; Scalp Massagers</text>

  <!-- Description -->
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Find the perfect massager for your needs</text>

  <!-- Icons representing different massager types -->
  <g transform="translate(250, 320)">
    <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.2)"/>
    <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,0.3)"/>
    <circle cx="-15" cy="-15" r="4" fill="rgba(255,255,255,0.6)"/>
    <circle cx="15" cy="-15" r="4" fill="rgba(255,255,255,0.6)"/>
    <circle cx="-15" cy="15" r="4" fill="rgba(255,255,255,0.6)"/>
    <circle cx="15" cy="15" r="4" fill="rgba(255,255,255,0.6)"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="500">Manual</text>
  </g>

  <g transform="translate(400, 320)">
    <rect x="-25" y="-25" width="50" height="50" rx="8" fill="rgba(255,255,255,0.2)"/>
    <circle cx="0" cy="0" r="15" fill="rgba(255,255,255,0.3)"/>
    <path d="M-10 0 L10 0 M0 -10 L0 10" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="500">Electric</text>
  </g>

  <g transform="translate(550, 320)">
    <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.2)"/>
    <path d="M-20 -20 A28 28 0 0 1 20 -20 A28 28 0 0 1 20 20 A28 28 0 0 1 -20 20 A28 28 0 0 1 -20 -20" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <path d="M-15 -15 A20 20 0 0 1 15 -15 A20 20 0 0 1 15 15 A20 20 0 0 1 -15 15 A20 20 0 0 1 -15 -15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="500">Air Pressure</text>
  </g>

  <!-- Feature badges -->
  <rect x="300" y="360" width="80" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="340" y="377" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Types</text>

  <rect x="400" y="360" width="80" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="440" y="377" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Tips</text>

  <rect x="500" y="360" width="80" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="540" y="377" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Reviews</text>
