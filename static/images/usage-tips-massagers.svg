<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8e44ad;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7d3c98;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#grad1)"/>

  <!-- Decorative elements -->
  <circle cx="200" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="600" cy="300" r="100" fill="rgba(255,255,255,0.08)"/>
  <circle cx="400" cy="200" r="150" fill="rgba(255,255,255,0.03)"/>

  <!-- Main title -->
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="bold">Usage Tips</text>

  <!-- Subtitle -->
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">Head &amp; Scalp Massagers</text>

  <!-- Description -->
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Maximize benefits with proper techniques</text>

  <!-- Step icons -->
  <g transform="translate(200, 320)">
    <circle cx="0" cy="0" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">1</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="500">Prepare</text>
  </g>

  <g transform="translate(400, 320)">
    <circle cx="0" cy="0" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">2</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="500">Massage</text>
  </g>

  <g transform="translate(600, 320)">
    <circle cx="0" cy="0" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">3</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="500">Maintain</text>
  </g>

  <!-- Connecting lines -->
  <line x1="225" y1="320" x2="375" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="425" y1="320" x2="575" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Feature badges -->
  <rect x="320" y="360" width="80" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="360" y="377" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Techniques</text>

  <rect x="420" y="360" width="80" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="460" y="377" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Tips</text>

  <rect x="520" y="360" width="80" height="25" rx="12" fill="rgba(255,255,255,0.3)"/>
  <text x="560" y="377" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Care</text>
</svg>
