{{ define "main" }}
<div class="error-404">
	<div class="error-code">404</div>
	<h1 class="error-title">Page Not Found</h1>
	<p class="error-message">Sorry, the page you are looking for does not exist or has been removed.</p>
	<div class="error-actions">
		<a href="{{ .Site.BaseURL }}" class="error-button">Back to Home</a>
		<a href="{{ "posts/" | relURL }}" class="error-button error-button-secondary">Browse Articles</a>
	</div>
	<div class="error-suggestions">
		<h3>You can try:</h3>
		<ul>
			<li>Check if the URL is correct</li>
			<li>Use the search function to find content</li>
			<li>Browse categories or tags</li>
		</ul>
	</div>
</div>

<style>
.error-404 {
	text-align: center;
	padding: 60px 20px;
}
.error-code {
	font-size: 8em;
	font-weight: 700;
	color: #e22d30;
	line-height: 1;
	margin-bottom: 20px;
}
.error-title {
	font-size: 2em;
	margin-bottom: 15px;
	color: #333;
}
.error-message {
	font-size: 1.1em;
	color: #666;
	margin-bottom: 30px;
}
.error-actions {
	margin-bottom: 40px;
}
.error-button {
	display: inline-block;
	padding: 12px 30px;
	background: #e22d30;
	color: #fff;
	text-decoration: none;
	border-radius: 4px;
	margin: 0 10px;
	transition: all 0.3s ease;
}
.error-button:hover {
	background: #c42528;
	transform: translateY(-2px);
}
.error-button-secondary {
	background: #666;
}
.error-button-secondary:hover {
	background: #555;
}
.error-suggestions {
	text-align: left;
	max-width: 300px;
	margin: 0 auto;
	padding: 20px;
	background: #f8f8f8;
	border-radius: 8px;
}
.error-suggestions h3 {
	margin-bottom: 15px;
	color: #333;
}
.error-suggestions ul {
	list-style: disc;
	padding-left: 20px;
	color: #666;
}
.error-suggestions li {
	margin-bottom: 8px;
}
@media (max-width: 768px) {
	.error-code {
		font-size: 5em;
	}
	.error-button {
		display: block;
		margin: 10px auto;
		max-width: 200px;
	}
}
</style>
{{ end }}
