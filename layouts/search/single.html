{{ define "main" }}
<div class="search-page">
	<h1 class="search-title">{{ .Title }}</h1>
	{{ .Content }}
	
	<div class="search-box-container">
		<input type="text" id="search-box-input" class="search-box-input" placeholder="Enter keywords to search...">
		<button id="search-box-button" class="search-box-button">Search</button>
	</div>
	
	<div id="search-box-results" class="search-box-results"></div>
</div>

<style>
.search-page {
	padding: 20px 0;
}
.search-title {
	margin-bottom: 30px;
	padding-bottom: 15px;
	border-bottom: 2px solid #e22d30;
}
.search-box-container {
	display: flex;
	gap: 10px;
	margin-bottom: 30px;
}
#search-box-input {
	flex: 1;
	padding: 12px 15px;
	font-size: 16px;
	border: 2px solid #ddd;
	border-radius: 4px;
	outline: none;
	transition: border-color 0.3s;
	width: 100%;
	background: #fff;
}
#search-box-input:focus {
	border-color: #e22d30;
	background: #fff;
}
#search-box-button {
	padding: 12px 25px;
	background: #e22d30;
	color: #fff;
	border: none;
	border-radius: 4px;
	cursor: pointer;
	font-size: 16px;
	transition: background 0.3s;
	width: auto;
}
#search-box-button:hover {
	background: #c42528;
}
.search-box-results {
	margin-top: 20px;
}
.search-result-item {
	padding: 20px;
	margin-bottom: 15px;
	background: #f8f8f8;
	border-radius: 4px;
	border-left: 3px solid #e22d30;
}
.search-result-title {
	margin: 0 0 10px 0;
	font-size: 1.2em;
}
.search-result-title a {
	color: #333;
	text-decoration: none;
}
.search-result-title a:hover {
	color: #e22d30;
}
.search-result-meta {
	font-size: 0.85em;
	color: #888;
	margin-bottom: 10px;
}
.search-result-summary {
	color: #555;
	line-height: 1.6;
}
.search-highlight {
	background: #fff3cd;
	padding: 0 2px;
}
.no-results {
	text-align: center;
	padding: 40px;
	color: #888;
}
@media (max-width: 768px) {
	.search-box-container {
		flex-direction: column;
	}
	#search-box-button {
		width: 100%;
	}
}
</style>

<script>
let searchIndex = [];

// Load search index
fetch('/index.json')
	.then(response => response.json())
	.then(data => {
		searchIndex = data;
	})
	.catch(error => console.error('Error loading search index:', error));

function performSearch(query) {
	if (!query.trim() || searchIndex.length === 0) {
		return [];
	}
	
	const results = [];
	const lowerQuery = query.toLowerCase();
	
	searchIndex.forEach(page => {
		const title = (page.title || '').toLowerCase();
		const content = (page.content || '').toLowerCase();
		const description = (page.description || '').toLowerCase();
		const tags = (page.tags || []).join(' ').toLowerCase();
		const categories = (page.categories || []).join(' ').toLowerCase();
		
		if (title.includes(lowerQuery) || 
		    content.includes(lowerQuery) || 
		    description.includes(lowerQuery) ||
		    tags.includes(lowerQuery) ||
		    categories.includes(lowerQuery)) {
			results.push({
				title: page.title,
				url: page.url,
				date: page.date,
				description: page.description || '',
				content: page.content ? page.content.substring(0, 200) + '...' : ''
			});
		}
	});
	
	return results;
}

function displaySearchResults(results, query) {
	const container = document.getElementById('search-box-results');
	
	if (results.length === 0) {
		container.innerHTML = '<div class="no-results">No results found for "' + escapeHtml(query) + '"</div>';
		return;
	}
	
	let html = '';
	results.forEach(result => {
		const date = new Date(result.date).toLocaleDateString('en-US');
		html += `
			<div class="search-result-item">
				<h3 class="search-result-title">
					<a href="${escapeHtml(result.url)}">${highlightText(escapeHtml(result.title), escapeHtml(query))}</a>
				</h3>
				<div class="search-result-meta">Published on ${date}</div>
				<div class="search-result-summary">${highlightText(escapeHtml(result.description || result.content), escapeHtml(query))}</div>
			</div>
		`;
	});
	
	container.innerHTML = html;
}

function highlightText(text, query) {
	if (!text) return '';
	const regex = new RegExp('(' + escapeRegex(query) + ')', 'gi');
	return text.replace(regex, '<span class="search-highlight">$1</span>');
}

function escapeHtml(text) {
	const div = document.createElement('div');
	div.textContent = text;
	return div.innerHTML;
}

function escapeRegex(string) {
	return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.getElementById('search-box-button').addEventListener('click', function() {
	const query = document.getElementById('search-box-input').value;
	const results = performSearch(query);
	displaySearchResults(results, query);
});

document.getElementById('search-box-input').addEventListener('keypress', function(e) {
	if (e.key === 'Enter') {
		const query = this.value;
		const results = performSearch(query);
		displaySearchResults(results, query);
	}
});
</script>
{{ end }}
